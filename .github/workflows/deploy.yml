name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only the deploy job needs Pages write / id-token; the build job just reads
# the repo. Splitting the two means a transient Pages-deploy failure is
# retried on its own — the from-source build is NOT re-run (mirrors
# wasthon's test/deploy split).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds the numpy/pandas/scipy wasm modules + VFS blobs from source
      # (clones wasthon@main for the bridge + Brython + the generic
      # cython-support layer, pins numpy/pandas/scipy/Cython). No committed blobs.
      - name: Build WASM/VFS artifacts
        run: ./build.sh

      # Pages layout: /loader/*.html reference ../build/*, so both directories
      # sit side by side under the site root; / redirects to /loader/.
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r loader _site/loader
          cp -r build _site/build
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=loader/">' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
