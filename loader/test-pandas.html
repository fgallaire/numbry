<body>
<p style="font-size:0.85em;margin:0 0 1em 0;"><a href="index.html">← back to index</a></p>
<h1>Wasthon — pandas smoke test</h1>
<p style="color:#666;font-size:0.9em;max-width:70ch;">
  Imports <b>pandas 2.2.3</b> — the real thing: 43 <code>pandas._libs</code>
  C/Cython extension modules compiled to wasm (plus numpy's C core and
  numpy.random) — and runs a basic functional checklist.
</p>
<pre id="log" style="background:#f4f4f4;padding:1em;font-size:13px;line-height:1.4;"></pre>

<script type="text/x-pandas-smoke" id="smoke">
import traceback

_ok = 0
_fail = 0

def check(name, fn):
    global _ok, _fail
    try:
        r = fn()
        _ok += 1
        print("PASS " + name + " => " + str(r)[:70].replace("\n", " | "))
    except BaseException as e:
        _fail += 1
        print("FAIL " + name + " " + type(e).__name__ + ": " + str(e)[:80])

# dateutil's zoneinfo comes pre-extracted (window.DATEUTIL_ZONEINFO, built by
# gen_pandas_vfs.mjs); the VFS's dateutil.zoneinfo override parses zones lazily.

import pandas as pd
import numpy as np
print("import pandas OK, version " + pd.__version__)

check("Series", lambda: pd.Series([1, 2, 3]).sum())
check("DataFrame", lambda: pd.DataFrame({"a": [1, 2, 3], "b": [4.0, 5.0, 6.0]}).shape)
check("df.mean", lambda: pd.DataFrame({"a": [1, 2, 3]}).mean().iloc[0])
check("df.describe", lambda: pd.DataFrame({"a": [1, 2, 3]}).describe().shape)
check("groupby", lambda: pd.DataFrame({"k": ["x", "y", "x"], "v": [1, 2, 3]}).groupby("k")["v"].sum().to_dict())
check("merge", lambda: pd.merge(pd.DataFrame({"k": [1, 2], "a": [10, 20]}), pd.DataFrame({"k": [1, 2], "b": [30, 40]}), on="k").shape)
check("date_range", lambda: len(pd.date_range("2026-01-01", periods=5, freq="D")))
check("Timestamp", lambda: pd.Timestamp("2026-07-10").day_name())
check("to_datetime", lambda: pd.to_datetime("2026-07-10 12:30").hour)
check("Categorical", lambda: pd.Categorical(["a", "b", "a"]).categories.tolist())
check("cut", lambda: pd.cut([1, 5, 9], bins=3).codes.tolist())
check("concat", lambda: pd.concat([pd.DataFrame({"a": [1]}), pd.DataFrame({"a": [2]})]).shape)
check("pivot_table", lambda: pd.DataFrame({"k": ["x", "x", "y"], "c": ["p", "q", "p"], "v": [1, 2, 3]}).pivot_table(index="k", columns="c", values="v").shape)
check("sort_values", lambda: pd.DataFrame({"a": [3, 1, 2]}).sort_values("a")["a"].tolist())
check("isna", lambda: pd.isna(pd.Series([1.0, None, 3.0])).tolist())
check("str accessor", lambda: pd.Series(["ab", "cd"]).str.upper().tolist())
check("np interop", lambda: pd.Series(np.arange(4)).values.sum())


def _read_csv():
    import io
    df = pd.read_csv(io.StringIO("a,b\n1,2\n3,4\n"))
    return (df.shape, df["a"].tolist())


check("read_csv", _read_csv)
check("to_json", lambda: pd.DataFrame({"a": [1, 2]}).to_json())
check("to_string", lambda: pd.DataFrame({"a": [1, 2], "b": ["x", "y"]}).to_string().replace("\n", " | "))

print(str(_ok) + "/" + str(_ok + _fail) + " checks passed")
</script>

<script type="module">
const logEl = document.getElementById('log');
const log = (s) => { logEl.textContent += s + '\n'; };

const $B = window.__BRYTHON__;
globalThis.$B = $B;
globalThis.__BRYTHON__ = $B;
globalThis._b_ = $B.builtins;

// C extension modules living in the combined wasm -> their PyInit export.
const RAND_C = {
  'numpy.random._common':            '_PyInit__common',
  'numpy.random.bit_generator':      '_PyInit_bit_generator',
  'numpy.random._mt19937':           '_PyInit__mt19937',
  'numpy.random._philox':            '_PyInit__philox',
  'numpy.random._pcg64':             '_PyInit__pcg64',
  'numpy.random._sfc64':             '_PyInit__sfc64',
  'numpy.random._bounded_integers':  '_PyInit__bounded_integers',
  'numpy.random._generator':         '_PyInit__generator',
  'numpy.random.mtrand':             '_PyInit_mtrand',
};
const PD_C = {
  'pandas._libs.tslibs.base': '_PyInit_base',
  'pandas._libs.tslibs.ccalendar': '_PyInit_ccalendar',
  'pandas._libs.tslibs.np_datetime': '_PyInit_np_datetime',
  'pandas._libs.tslibs.dtypes': '_PyInit_dtypes',
  'pandas._libs.tslibs.timezones': '_PyInit_timezones',
  'pandas._libs.tslibs.nattype': '_PyInit_nattype',
  'pandas._libs.tslibs.conversion': '_PyInit_conversion',
  'pandas._libs.tslibs.timedeltas': '_PyInit_timedeltas',
  'pandas._libs.tslibs.tzconversion': '_PyInit_tzconversion',
  'pandas._libs.tslibs.timestamps': '_PyInit_timestamps',
  'pandas._libs.tslibs.fields': '_PyInit_fields',
  'pandas._libs.tslibs.offsets': '_PyInit_offsets',
  'pandas._libs.tslibs.parsing': '_PyInit_parsing',
  'pandas._libs.tslibs.period': '_PyInit_period',
  'pandas._libs.tslibs.strptime': '_PyInit_strptime',
  'pandas._libs.tslibs.vectorized': '_PyInit_vectorized',
  'pandas._libs.interval': '_PyInit_interval',
  'pandas._libs.hashtable': '_PyInit_hashtable',
  'pandas._libs.missing': '_PyInit_missing',
  'pandas._libs.lib': '_PyInit_lib',
  'pandas._libs.tslib': '_PyInit_tslib',
  'pandas._libs.algos': '_PyInit_algos',
  'pandas._libs.arrays': '_PyInit_arrays',
  'pandas._libs.groupby': '_PyInit_groupby',
  'pandas._libs.hashing': '_PyInit_hashing',
  'pandas._libs.index': '_PyInit_index',
  'pandas._libs.indexing': '_PyInit_indexing',
  'pandas._libs.internals': '_PyInit_internals',
  'pandas._libs.join': '_PyInit_join',
  'pandas._libs.ops': '_PyInit_ops',
  'pandas._libs.ops_dispatch': '_PyInit_ops_dispatch',
  'pandas._libs.properties': '_PyInit_properties',
  'pandas._libs.reshape': '_PyInit_reshape',
  'pandas._libs.sparse': '_PyInit_sparse',
  'pandas._libs.writers': '_PyInit_writers',
  'pandas._libs.pandas_datetime': '_PyInit_pandas_datetime',
  'pandas._libs.pandas_parser': '_PyInit_pandas_parser',
  'pandas._libs.window.indexers': '_PyInit_indexers',
  'pandas._libs.window.aggregations': '_PyInit_aggregations',
  'pandas._libs.testing': '_PyInit_testing',
  'pandas._libs.parsers': '_PyInit_parsers',
  'pandas._libs.json': '_PyInit_json'
};

try {
  log('loading combined numpy + numpy.random + pandas._libs wasm…');
  const factory = (await import('../build/nppd.mjs')).default;
  const M = await factory();
  M._wasthon_init();

  function runMA() {
    const name = 'numpy._core._multiarray_umath';
    if ($B.imported[name] !== undefined) return;
    const def = M._PyInit__multiarray_umath();
    const cmod = M._wasthon_module_create(def);
    if (cmod !== 0) {
      $B.imported[name] = M.wasthon.handles.get(cmod);
      try { $B.str_dict_set($B.get_dict($B.imported['numpy._core']), '_multiarray_umath', $B.imported[name]); } catch(e){}
    }
  }

  // create a C extension module from its PyInit export. The Python parents
  // come from the VFS through the ordinary Brython import; multi-phase defs
  // get their full dotted name (relative imports inside Py_mod_exec),
  // single-phase inits (ujson) return the finished module directly.
  const orig = $B.$__import__;
  function runC(fullname, pyinit) {
    if ($B.imported[fullname] !== undefined) return true;
    const parts = fullname.split('.');
    const parent = parts.slice(0, -1).join('.');
    if (parent && $B.imported[parent] === undefined) {
      try { orig(parent, {}, {}, [], 0); } catch(e){}
    }
    if ($B.imported[fullname] !== undefined) return true;  // parent exec imported us
    const def = M[pyinit]();
    if (def === 0) { log('  [C] ' + fullname + ' PyInit returned NULL'); return false; }
    let mod = null;
    try { if (!M.wasthon.moduleDefs.get(def)) mod = M.wasthon.handles.get(def); } catch(e){}
    if (!mod) {
      try { const di = M.wasthon.moduleDefs.get(def); if (di) di.name = fullname; } catch(e){}
      const cmod = M._wasthon_module_create(def);
      if (cmod === 0) {
        const pe = M.wasthon && M.wasthon.pendingException;
        let pm = '(silent)';
        if (pe) {
          try { pm = String(_b_.str.$factory(pe.value || pe.msg)); } catch(e) { pm = String(pe.msg); }
          try { pm = ($B.class_name(pe.value || M.wasthon.unwrap(pe.exc)) || '') + ': ' + pm; } catch(e){}
        }
        log('  [C] ' + fullname + ' init FAILED: ' + String(pm).slice(0, 200));
        return false;
      }
      mod = M.wasthon.handles.get(cmod);
    } else {
      try { $B.str_dict_set($B.get_dict(mod), '__name__', fullname); } catch(e){}
    }
    $B.imported[fullname] = mod;
    if (parent) { try { $B.str_dict_set($B.get_dict($B.imported[parent]), parts[parts.length - 1], mod); } catch(e){} }
    return true;
  }

  $B.$__import__ = function(mod_name, globals, locals, fromlist, level) {
    try {
      if (level > 0 && typeof mod_name === 'string' && mod_name) {
        const abs = 'numpy.random.' + mod_name;
        if (RAND_C[abs]) { runC(abs, RAND_C[abs]); if ($B.imported[abs]) return $B.imported[abs]; }
        for (const pref of ['pandas._libs.tslibs.', 'pandas._libs.window.', 'pandas._libs.']) {
          const pabs = pref + mod_name;
          if (PD_C[pabs]) { runC(pabs, PD_C[pabs]); if ($B.imported[pabs]) return $B.imported[pabs]; }
        }
      }
      if (typeof mod_name === 'string') {
        if (mod_name === 'numpy._core._multiarray_umath') runMA();
        if (RAND_C[mod_name]) runC(mod_name, RAND_C[mod_name]);
        if (PD_C[mod_name]) runC(mod_name, PD_C[mod_name]);
        if (fromlist && fromlist.length) for (const f of fromlist) {
          try {
            const sub = mod_name + '.' + (typeof f === 'string' ? f : $B.$getattr(f, '__name__', f));
            if (mod_name === 'numpy._core' && sub === 'numpy._core._multiarray_umath') runMA();
            if (RAND_C[sub]) runC(sub, RAND_C[sub]);
            if (PD_C[sub]) runC(sub, PD_C[sub]);
          } catch(e){}
        }
      }
    } catch(e) { console.warn('import hook:', e); }
    return orig.apply(this, arguments);
  };

  const smokeSrc = document.getElementById('smoke').textContent;
  const origConsole = console.log;
  console.log = (...a) => { logEl.textContent += a.map(x => typeof x === 'string' ? x : String(x)).join(' '); };
  const t0 = performance.now();
  try { $B.runPythonSource(smokeSrc, 'pandas_smoke'); }
  finally { console.log = origConsole; }
  log('(' + (performance.now() - t0).toFixed(0) + ' ms)');
  log('=== done ===');
} catch(e) {
  log('BOOT FAILED: ' + (e && (e.args ? String(e.args[0]) : (e.stack || e.message || e))));
  log('=== done ===');
  console.error(e);
}
</script>
</body>
